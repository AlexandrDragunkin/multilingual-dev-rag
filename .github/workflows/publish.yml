name: publish

# Trusted Publishing: PyPI доверяет этому workflow по OIDC, API-токена нет
# нигде — ни в секретах репозитория, ни на диске. Требует однократной настройки
# на стороне PyPI (Publishing -> Add a new pending publisher):
#
#   PyPI Project Name:  multilingual-dev-rag
#   Owner:              AlexandrDragunkin
#   Repository name:    multilingual-dev-rag
#   Workflow name:      publish.yml
#   Environment name:   pypi
#
# Публикация — по тегу, и тег И ЕСТЬ версия: setuptools-scm читает его из git
# (v0.1.0 -> 0.1.0). Сверять тег с pyproject больше не нужно — номера в
# pyproject нет, расходиться нечему.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Страховка, а не необходимость — проверено имитацией checkout@v4:
          # при пуше тега он фетчит сам тег (refspec +refs/tags/v*:refs/tags/v*)
          # и чекаутит его, так что даже в shallow-клоне git describe находит
          # тег на HEAD и версия собирается верной. Держим fetch-depth: 0 ради
          # workflow_dispatch (запуск с ветки, где тега на HEAD нет) и чтобы не
          # зависеть от внутренних деталей checkout. Настоящий заслон — шаг
          # сверки собранной версии с тегом ниже.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Install the package and run its tests
        # Публикация не должна зависеть от того, посмотрел ли человек на
        # зелёную галочку перед тем, как поставить тег. Workflow tests.yml
        # ходит по push в main и о теге ничего не знает: без этого шага тег на
        # сломанном коммите уехал бы в PyPI, а номер версии оттуда не
        # отзывается — только новый.
        #
        # Матрицу здесь не гоняем: три ОS x четыре Python уже прошли на этом
        # коммите в tests.yml. Здесь нужен последний заслон, а не повтор.
        run: |
          pip install -e ".[dev]"
          pytest tests/ -q

      - name: Build
        run: python -m build

      - name: Check metadata
        run: python -m twine check dist/*

      - name: Built version must be exactly the tag
        # Не сверка тега с pyproject (её сняли вместе с номером в pyproject) —
        # проверка, что setuptools-scm вообще УВИДЕЛ тег. Без тегов в клоне он
        # не падает, а выдаёт 0.1.1.dev1+g<hash>. PyPI такой артефакт отвергнет
        # из-за локальной части (+g...), но уже на последнем шаге и с
        # сообщением про PEP 440, из которого причину не видно. Здесь отказ
        # приходит сразу после сборки и называет причину.
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          BUILT=$(ls dist/*.tar.gz | sed -E 's|.*/multilingual_dev_rag-(.*)\.tar\.gz|\1|')
          echo "tag=$TAG  built=$BUILT"
          if [ "$TAG" != "$BUILT" ]; then
            echo "::error::Built version $BUILT != tag $TAG — setuptools-scm did not see the tag (fetch-depth: 0 missing?)"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest

    # Environment даёт возможность повесить ручное подтверждение на релиз
    # (Settings -> Environments -> pypi -> Required reviewers) и то же имя
    # указывается в pending publisher на PyPI.
    environment:
      name: pypi
      url: https://pypi.org/p/multilingual-dev-rag

    permissions:
      # Единственное, что нужно для Trusted Publishing. Без токенов.
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
